<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shigure Mascot - Z-Index & Eyes Fix</title>
<style>
  body { margin: 0; overflow: hidden; background: transparent; }

  /* --- ปุ่ม Toggle --- */
  #toggle-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 24px;
    z-index: 20000; /* ดันขึ้นไปสูงสุด */
    transition: all 0.3s ease;
  }

  /* --- กล่องน้อง --- */
  .shigure-container {
    position: fixed;
    width: 500px;  
    height: 500px; 
    top: calc(100vh - 380px); 
    left: calc(100vw - 550px);
    cursor: grab;
    z-index: 9999;
    user-select: none;
    touch-action: none;
  }

  .shigure-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center bottom;
    pointer-events: none;
  }

  /* --- ลำดับการวางเลเยอร์ (Z-INDEX FIX) --- */
  /* พวกท่าทางพิเศษ (Full Body) ให้สูงที่สุด */
  .layer-edge-full  { z-index: 500; background-image: url('shigure_edge.png'); opacity: 0; }
  .layer-edge-blink { z-index: 510; background-image: url('shigure_edge2.png'); opacity: 0; }
  .layer-fall-full  { z-index: 400; background-image: url('shigure_fall.png'); opacity: 0; }
  .layer-drag-full  { z-index: 410; background-image: url('shigure_drag.png'); opacity: 0; }
  .layer-drag-alt   { z-index: 420; background-image: url('shigure_drag2.png'); opacity: 0; }

  /* ชิ้นส่วนแยก (Idle) */
  .layer-hair-back    { z-index: 10;  background-image: url('hair back.png'); animation: hairBackSway 10s ease-in-out infinite; transform-origin: center top; }
  .layer-costume-back { z-index: 20;  background-image: url('costume Back.png'); }
  .layer-main-body    { z-index: 30;  background-image: url('main body.png'); }
  .layer-arm-l        { z-index: 40;  background-image: url('arm L.png'); }
  .layer-arm-r        { z-index: 50;  background-image: url('arm R.png'); }
  .layer-arm-shock-l  { z-index: 60;  background-image: url('arm shock L.png'); opacity: 0; }
  .layer-arm-shock-r  { z-index: 70;  background-image: url('arm shock R.png'); opacity: 0; }
  .layer-neck         { z-index: 80;  background-image: url('neck.png'); }
  .layer-costume-front{ z-index: 90;  background-image: url('costume Front.png'); }
  
  /* ส่วนหัว */
  .layer-head         { z-index: 100; background-image: url('Head.png'); animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  
  /* [สำคัญ] ส่วนใบหน้า ต้อง Z-Index สูงกว่า Head (100) ชัดเจน */
  .layer-eyes-l       { z-index: 110; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-eyes-r       { z-index: 111; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-eye-blink-l  { z-index: 112; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-eye-blink-r  { z-index: 113; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-mouth        { z-index: 120; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-eye-shock-l  { z-index: 130; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-eye-shock-r  { z-index: 131; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-mouth-shock  { z-index: 140; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  
  .layer-hair-front   { z-index: 150; background-image: url('hair front.png'); animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
  .layer-hair-l       { z-index: 160; background-image: url('hair L.png'); animation: hairSideSwayL 9s ease-in-out infinite; transform-origin: 85% 10%; }
  .layer-hair-r       { z-index: 170; background-image: url('hair R.png'); animation: hairSideSwayR 9s ease-in-out infinite; transform-origin: 15% 10%; }

  @keyframes headNaturalMove { 0%, 25%, 100% { transform: rotate(0deg) translateY(0); } 35%, 50% { transform: rotate(-1.5deg) translateY(1px); } 60%, 75% { transform: rotate(1.5deg) translateY(-1px); } 85%, 95% { transform: rotate(0deg) translateY(4px); } }
  @keyframes hairBackSway { 0%, 100% { transform: skewX(-0.5deg); } 50% { transform: skewX(0.5deg); } }
  @keyframes hairSideSwayL { 0%, 100% { transform: rotate(-1deg) skewY(0.5deg); } 50% { transform: rotate(1.2deg) skewY(-0.5deg); } }
  @keyframes hairSideSwayR { 0%, 100% { transform: rotate(1deg) skewY(-0.5deg); } 50% { transform: rotate(-1.2deg) skewY(0.5deg); } }
</style>
</head>
<body>

<div id="toggle-btn">v</div>

<div class="shigure-container" id="shigure-mascot">
  <div class="shigure-layer layer-edge-full" id="mascot-edge-full"></div>
  <div class="shigure-layer layer-edge-blink" id="mascot-edge-blink"></div>
  <div class="shigure-layer layer-fall-full" id="mascot-fall-full"></div>
  <div class="shigure-layer layer-drag-full" id="mascot-drag-full"></div>
  <div class="shigure-layer layer-drag-alt" id="mascot-drag-alt"></div>

  <div id="mascot-parts">
    <div class="shigure-layer layer-hair-back"></div>
    <div class="shigure-layer layer-costume-back"></div>
    <div class="shigure-layer layer-main-body"></div>
    <div class="shigure-layer layer-arm-l" id="arm-normal-l"></div>
    <div class="shigure-layer layer-arm-r" id="arm-normal-r"></div>
    <div class="shigure-layer layer-arm-shock-l" id="arm-shock-l"></div>
    <div class="shigure-layer layer-arm-shock-r" id="arm-shock-r"></div>
    <div class="shigure-layer layer-neck"></div>
    <div class="shigure-layer layer-costume-front"></div>
    <div class="shigure-layer layer-head"></div>
    
    <div class="shigure-layer layer-eyes-l" id="eye-open-l" style="background-image: url('eye L.png');"></div>
    <div class="shigure-layer layer-eyes-r" id="eye-open-r" style="background-image: url('eyes R.png');"></div>
    <div class="shigure-layer layer-eye-blink-l" id="eye-close-l" style="background-image: url('eye L close.png'); opacity: 0;"></div>
    <div class="shigure-layer layer-eye-blink-r" id="eye-close-r" style="background-image: url('eye R close.png'); opacity: 0;"></div>
    <div class="shigure-layer layer-mouth" id="mouth-normal" style="background-image: url('mouth.png');"></div>
    <div class="shigure-layer layer-eye-shock-l" id="eye-shock-l" style="background-image: url('eye shock L.png'); opacity: 0;"></div>
    <div class="shigure-layer layer-eye-shock-r" id="eye-shock-r" style="background-image: url('eye shock R.png'); opacity: 0;"></div>
    <div class="shigure-layer layer-mouth-shock" id="mouth-shock" style="background-image: url('mouth shock.png'); opacity: 0;"></div>
    
    <div class="shigure-layer layer-hair-front"></div>
    <div class="shigure-layer layer-hair-l"></div>
    <div class="shigure-layer layer-hair-r"></div>
  </div>
</div>

<script>
  // ... (ใส่ JavaScript เดิมทั้งหมดจากข้อความก่อนหน้าได้เลยครับ) ...
  // เพราะ Logic ข้างในเหมือนเดิมเป๊ะ แค่เปลี่ยนลำดับภาพใน HTML และ CSS ครับ
  
  const mascot = document.getElementById('shigure-mascot');
  const toggleBtn = document.getElementById('toggle-btn');
  const mascotParts = document.getElementById('mascot-parts');
  const mascotDragFull = document.getElementById('mascot-drag-full');
  const mascotDragAlt = document.getElementById('mascot-drag-alt');
  const mascotFallFull = document.getElementById('mascot-fall-full');
  const mascotEdgeFull = document.getElementById('mascot-edge-full');
  const mascotEdgeBlink = document.getElementById('mascot-edge-blink');
  
  const eyes = {
    openL: document.getElementById('eye-open-l'), openR: document.getElementById('eye-open-r'),
    closeL: document.getElementById('eye-close-l'), closeR: document.getElementById('eye-close-r'),
    shockL: document.getElementById('eye-shock-l'), shockR: document.getElementById('eye-shock-r')
  };

  let isDragging = false, isShocked = false, isFalling = false, isPeeking = false, isHidden = false, hasMoved = false;
  let offsetX = 0, offsetY = 0;
  let idleTimer, peekWaitTimer, edgeBlinkInterval, randomPeekGlobalTimer;

  function hideAllEyes() { Object.values(eyes).forEach(eye => eye.style.opacity = '0'); }
  function resetEyesToNormal() { hideAllEyes(); eyes.openL.style.opacity = '1'; eyes.openR.style.opacity = '1'; }
  function resetAllLayers() { 
    mascotDragFull.style.opacity = '0'; mascotDragAlt.style.opacity = '0'; 
    mascotFallFull.style.opacity = '0'; mascotEdgeFull.style.opacity = '0'; 
    mascotEdgeBlink.style.opacity = '0'; mascotParts.style.opacity = '1';
    stopEdgeBlinking(); resetEyesToNormal();
  }

  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    clearTimeout(idleTimer); clearTimeout(peekWaitTimer); clearTimeout(randomPeekGlobalTimer);
    isHidden = !isHidden; isPeeking = false; isFalling = false; isShocked = false; isDragging = false; 
    resetAllLayers();
    if (isHidden) { mascot.style.top = window.innerHeight + 'px'; toggleBtn.innerText = '^'; }
    else { mascot.style.top = (window.innerHeight - 380) + 'px'; toggleBtn.innerText = 'v'; resetIdleTimer(); }
  });

  function startDrag(clientX, clientY) {
    if (isHidden) return;
    const wasFalling = isFalling;
    clearTimeout(peekWaitTimer); clearTimeout(randomPeekGlobalTimer); stopEdgeBlinking();
    isDragging = true; hasMoved = false; isPeeking = false; isShocked = false; isFalling = false;
    const rect = mascot.getBoundingClientRect();
    offsetX = clientX - rect.left; offsetY = clientY - rect.top;
    mascotParts.style.opacity = '0'; mascotFallFull.style.opacity = '0'; mascotEdgeFull.style.opacity = '0';
    if (wasFalling) { mascotDragFull.style.opacity = '0'; mascotDragAlt.style.opacity = '1'; }
    else { mascotDragFull.style.opacity = '1'; mascotDragAlt.style.opacity = '0'; }
    mascot.style.transition = 'none';
  }

  function moveMascot(clientX, clientY) {
    if (!isDragging) return;
    hasMoved = true;
    mascot.style.left = (clientX - offsetX) + 'px';
    mascot.style.top = (clientY - offsetY) + 'px';
  }

  function endDrag() {
    if (!isDragging) return;
    isDragging = false; isFalling = true;
    mascotDragFull.style.opacity = '0'; mascotDragAlt.style.opacity = '0'; mascotFallFull.style.opacity = '1';
    mascot.style.transition = 'top 0.6s cubic-bezier(0.47, 0, 0.745, 0.715)';
    mascot.style.top = (window.innerHeight - 380) + 'px';
    setTimeout(() => {
      if (!isDragging && !isHidden) {
        mascotFallFull.style.opacity = '0'; mascotEdgeFull.style.opacity = '1'; startEdgeBlinking();
        setTimeout(() => {
          if (!isDragging && !isHidden && !isPeeking) {
            stopEdgeBlinking(); mascotEdgeFull.style.opacity = '0'; mascotParts.style.opacity = '1';
            isFalling = false; resetEyesToNormal(); resetIdleTimer();
          }
        }, 1200);
      }
    }, 600);
  }

  mascot.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
  document.addEventListener('mousemove', (e) => moveMascot(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);
  mascot.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
  document.addEventListener('touchmove', (e) => { if(isDragging){ moveMascot(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, {passive:false});
  document.addEventListener('touchend', endDrag);

  function randomPeek() {
    if (isDragging || isShocked || isFalling || isPeeking || isHidden) return;
    isPeeking = true;
    mascot.style.transition = 'top 0.8s ease-in';
    mascot.style.top = window.innerHeight + 'px';
    randomPeekGlobalTimer = setTimeout(() => {
      if (isHidden || isDragging) { isPeeking = false; return; }
      mascot.style.left = Math.random() * (window.innerWidth - 500) + 'px';
      mascotParts.style.opacity = '1'; mascotEdgeFull.style.opacity = '0'; resetEyesToNormal();
      mascot.style.transition = 'top 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      mascot.style.top = (window.innerHeight - 380) + 'px';
      setTimeout(() => {
        if (isPeeking && !isDragging && !isHidden) {
          mascotParts.style.opacity = '0'; mascotEdgeFull.style.opacity = '1'; startEdgeBlinking();
          peekWaitTimer = setTimeout(() => {
            if (isPeeking && !isDragging && !isHidden) {
              stopEdgeBlinking(); mascotEdgeFull.style.opacity = '0'; mascotParts.style.opacity = '1';
              isPeeking = false; resetIdleTimer();
            }
          }, 10000);
        }
      }, 1200);
    }, 1000);
  }

  function resetIdleTimer() { clearTimeout(idleTimer); if(!isDragging && !isShocked && !isFalling && !isPeeking && !isHidden) idleTimer = setTimeout(randomPeek, 3000); }
  function startEdgeBlinking() { stopEdgeBlinking(); edgeBlinkInterval = setInterval(() => { if(mascotEdgeFull.style.opacity === '1'){ mascotEdgeBlink.style.opacity = '1'; setTimeout(() => { if(mascotEdgeFull.style.opacity === '1') mascotEdgeBlink.style.opacity = '0'; }, 150); } }, 3000 + Math.random() * 2000); }
  function stopEdgeBlinking() { clearInterval(edgeBlinkInterval); mascotEdgeBlink.style.opacity = '0'; }

  setInterval(() => { if(!isShocked && !isDragging && !isFalling && !isPeeking && !isHidden){ eyes.openL.style.opacity = '0'; eyes.openR.style.opacity = '0'; eyes.closeL.style.opacity = '1'; eyes.closeR.style.opacity = '1'; setTimeout(() => { if(!isShocked && !isDragging && !isFalling && !isPeeking && !isHidden) resetEyesToNormal(); }, 150); } }, 4000);
  
  mascot.addEventListener('click', () => { 
    if(hasMoved || isShocked || isDragging || isFalling || isPeeking || isHidden) return; 
    isShocked = true; clearTimeout(idleTimer); hideAllEyes(); 
    eyes.shockL.style.opacity = '1'; eyes.shockR.style.opacity = '1'; 
    document.getElementById('mouth-shock').style.opacity = '1'; 
    document.getElementById('arm-normal-l').style.opacity = '0'; 
    document.getElementById('arm-normal-r').style.opacity = '0'; 
    document.getElementById('arm-shock-l').style.opacity = '1'; 
    document.getElementById('arm-shock-r').style.opacity = '1'; 
    mascot.style.transform = 'scale(1.1) translateY(-15px)'; 
    setTimeout(() => { 
      isShocked = false; resetEyesToNormal(); 
      document.getElementById('mouth-shock').style.opacity = '0'; 
      document.getElementById('arm-normal-l').style.opacity = '1'; 
      document.getElementById('arm-normal-r').style.opacity = '1'; 
      document.getElementById('arm-shock-l').style.opacity = '0'; 
      document.getElementById('arm-shock-r').style.opacity = '0'; 
      mascot.style.transform = 'scale(1)'; resetIdleTimer(); 
    }, 1000); 
  });

  resetIdleTimer();
</script>
</body>
</html>
