<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shigure Mascot - Default Show Version</title>
<style>
  /* 1. ปุ่ม Toggle ^ */
  .toggle-btn {
    position: absolute;
    top: 250px; /* อยู่ประมาณกลางกล่องน้อง */
    right: 20px;
    width: 40px;
    height: 40px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    z-index: 10000;
    transition: transform 0.3s ease, background 0.3s;
    pointer-events: auto;
  }
  .toggle-btn:hover { background: rgba(0, 0, 0, 0.8); }
  .toggle-btn.hidden-state { transform: rotate(180deg); }

  /* 2. กล่องควบคุมตัวละคร */
  .shigure-container {
    position: fixed;
    width: 500px;  
    height: 500px; 
    /* --- ตั้งค่าเริ่มต้นให้โผล่มาเลย --- */
    top: calc(100vh - 380px); 
    left: calc(100vw - 550px);
    
    cursor: grab;
    z-index: 9999;
    user-select: none;
    touch-action: none;
    transform-origin: center bottom;
    transition: top 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }
  
  /* ... (Style ส่วนอื่นๆ เหมือนเดิม) ... */
</style>
</head>
<body>

<div class="shigure-container" id="shigure-mascot">
  <div class="toggle-btn" id="toggle-btn">^</div>
  
  <div class="shigure-layer layer-edge-full" id="mascot-edge-full"></div>
  <div class="shigure-layer layer-edge-blink" id="mascot-edge-blink"></div>
  <div class="shigure-layer layer-fall-full" id="mascot-fall-full"></div>
  <div class="shigure-layer layer-drag-full" id="mascot-drag-full"></div>
  <div id="mascot-parts"> </div>
</div>

<script>
  // ... (ประกาศตัวแปรเหมือนเดิม) ...
  let isHidden = false; 

  // --- ระบบปุ่ม Toggle (ซ่อน/แสดง) ---
  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // กันไม่ให้ไปติด event ลากน้อง
    isHidden = !isHidden;

    if (isHidden) {
      // มุดซ่อนลงไป (เหลือไว้แค่ขอบบนและปุ่ม)
      mascot.style.top = (window.innerHeight - 50) + 'px';
      toggleBtn.classList.add('hidden-state');
      clearTimeout(idleTimer); // หยุดสุ่มโผล่
      stopEdgeBlinking();
    } else {
      // โผล่กลับมาตำแหน่ง Idle ปกติ
      const groundPos = window.innerHeight - 380;
      mascot.style.top = groundPos + 'px';
      toggleBtn.classList.remove('hidden-state');
      resetIdleTimer(); // กลับมาสุ่มโผล่ใหม่
    }
  });

  // --- ปรับแก้ในฟังก์ชัน randomPeek ---
  function randomPeek() {
    // ถ้าน้อง "ถูกซ่อนอยู่" ห้ามแอบวาร์ปไปโผล่ที่อื่น
    if (isDragging || isShocked || isFalling || isPeeking || isHidden) return;
    
    // ... (โค้ดมุดหายและสุ่มโผล่เหมือนเดิม) ...
  }

  // ... (โค้ดส่วนอื่นๆ คงเดิม) ...
  
  // เริ่มนับเวลา Idle ทันทีเมื่อโหลดหน้าเว็บ
  resetIdleTimer(); 
</script>
</body>
</html>
