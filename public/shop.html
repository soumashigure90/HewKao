<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HewKao Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* CSS เดิมของคุณทั้งหมด (ผมไม่ได้ตัดออกเลยเพื่อให้ธีมเหมือนเดิมเป๊ะ) */
:root {
  --pink:    #FFB7C5;
  --pink-l:  #FFE4EC;
  --pink-d:  #e8829a;
  --lav:      #C9B8F0;
  --lav-l:    #EDE8FC;
  --mint:    #B2E8D8;
  --mint-l:  #E2F8F2;
  --yellow:  #FFE5A0;
  --yellow-l:#FFF8DC;
  --peach:    #FFCBA4;
  --cream:    #FFF9F5;
  --text:    #4a3f5c;
  --text-s:  #8a7a9a;
  --white:    #ffffff;
  --radius:  18px;
  --shadow:  0 4px 24px rgba(180,140,200,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}
nav { background: var(--white); border-bottom: 2px solid var(--pink-l); padding: 0 2rem; display: flex; align-items: center; height: 64px; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(255,183,197,0.15); }
.nav-logo { font-family: 'Quicksand', sans-serif; font-size: 22px; font-weight: 700; color: var(--pink-d); letter-spacing: -0.5px; flex: 1; }
.nav-logo span { color: var(--lav); }
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-links a { text-decoration: none; font-size: 14px; font-weight: 600; color: var(--text-s); padding: 6px 14px; border-radius: 20px; transition: all 0.2s; }
.nav-links a:hover, .nav-links a.active { background: var(--pink-l); color: var(--pink-d); }
.nav-lang { display: flex; background: var(--cream); border-radius: 20px; overflow: hidden; border: 1.5px solid var(--pink-l); }
.nav-lang button { border: none; background: none; cursor: pointer; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--text-s); font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.nav-lang button.active { background: var(--pink); color: #fff; }
.btn-login { background: var(--lav); color: #fff; border: none; cursor: pointer; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 6px; position: relative; }
.btn-login:hover { background: var(--pink-d); transform: translateY(-1px); }
.user-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(180,140,200,0.2); border: 1.5px solid var(--pink-l); min-width: 190px; overflow: hidden; display: none; z-index: 999; animation: dropIn .2s cubic-bezier(0.34,1.4,0.64,1); }
@keyframes dropIn { from { opacity:0; transform:translateY(-8px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
.user-dropdown.open { display: block; }
.dropdown-header { padding: 12px 16px; background: linear-gradient(135deg,var(--pink-l),var(--lav-l)); font-size: 13px; font-weight: 700; color: var(--text); border-bottom: 1px solid var(--pink-l); }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; transition: background .15s; border: none; background: none; width: 100%; text-align: left; font-family: 'Nunito', sans-serif; }
.dropdown-item:hover { background: var(--pink-l); color: var(--pink-d); }
.dropdown-item .di { font-size: 16px; width: 20px; text-align: center; }
.dropdown-item.logout { color: #e05; }
.dropdown-item.logout:hover { background: #fff0f0; }
.dropdown-divider { height: 1px; background: var(--pink-l); margin: 4px 0; }

.hero { background: linear-gradient(135deg, var(--pink-l) 0%, var(--lav-l) 50%, var(--mint-l) 100%); padding: 4rem 2rem; text-align: center; position: relative; overflow: hidden; }
.hero-tag { display: inline-block; background: var(--pink); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 16px; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 1px; }
.hero h1 { font-family: 'Quicksand', sans-serif; font-size: clamp(28px, 5vw, 52px); font-weight: 700; color: var(--text); margin-bottom: 0.75rem; line-height: 1.2; }
.hero h1 em { color: var(--pink-d); font-style: normal; }
.hero p { font-size: 16px; color: var(--text-s); max-width: 480px; margin: 0 auto 2rem; line-height: 1.7; }
.hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-primary { background: var(--pink-d); color: #fff; border: none; cursor: pointer; padding: 13px 28px; border-radius: 30px; font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; box-shadow: 0 4px 16px rgba(232,130,154,0.35); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,130,154,0.4); }
.btn-outline { background: #fff; color: var(--text); border: 2px solid var(--pink-l); cursor: pointer; padding: 11px 28px; border-radius: 30px; font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.btn-outline:hover { border-color: var(--pink-d); color: var(--pink-d); transform: translateY(-2px); }

.section { padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }
.section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 1.75rem; }
.section-header h2 { font-family: 'Quicksand', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); }
.section-header .sub { font-size: 13px; color: var(--text-s); }
.cats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 2rem; }
.cat-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid transparent; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.cat-btn.c1 { background: var(--pink-l); color: var(--pink-d); }
.cat-btn.c1.active, .cat-btn.c1:hover { background: var(--pink); color: #fff; }
.cat-btn.c2 { background: var(--lav-l); color: #7c5cbf; }
.cat-btn.c2.active, .cat-btn.c2:hover { background: var(--lav); color: #fff; }
.cat-btn.c3 { background: var(--mint-l); color: #2e9e7a; }
.cat-btn.c3.active, .cat-btn.c3:hover { background: var(--mint); color: #fff; }
.cat-btn.c4 { background: var(--yellow-l); color: #b07d00; }
.cat-btn.c4.active, .cat-btn.c4:hover { background: var(--yellow); color: var(--text); }

.products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.22s, box-shadow 0.22s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(180,140,200,0.2); }
.card-img { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 56px; position: relative; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-img.bg1 { background: linear-gradient(135deg, var(--pink-l), var(--lav-l)); }
.card-img.bg2 { background: linear-gradient(135deg, var(--mint-l), var(--yellow-l)); }
.card-img.bg3 { background: linear-gradient(135deg, var(--lav-l), var(--pink-l)); }
.card-img.bg4 { background: linear-gradient(135deg, var(--yellow-l), var(--peach)); }
.card-badge { position: absolute; top: 10px; left: 10px; background: var(--pink-d); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 10px; letter-spacing: 0.5px; z-index: 2; }
.card-badge.digital { background: var(--lav); }
.card-badge.preorder { background: var(--peach); color: var(--text); }
.wishlist { position: absolute; top: 10px; right: 10px; background: #fff; border: none; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; z-index: 2; }
.card-body { padding: 14px 16px 16px; }
.card-body h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.card-body .card-sub { font-size: 12px; color: var(--text-s); margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.price { font-size: 16px; font-weight: 700; color: var(--pink-d); }
.price-sub { font-size: 11px; color: var(--text-s); font-weight: 400; }
.btn-cart { background: var(--pink-l); color: var(--pink-d); border: none; cursor: pointer; padding: 7px 14px; border-radius: 12px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.btn-cart:hover { background: var(--pink-d); color: #fff; }

.cart-badge-nav { position:absolute; top:-6px; right:-6px; background:var(--pink-d); color:#fff; width:18px; height:18px; border-radius:50%; font-size:10px; font-weight:700; display:none; align-items:center; justify-content:center; animation:badgePop 0.3s cubic-bezier(0.34,1.8,0.64,1); }
.cart-badge-nav.show { display:flex; }
@keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

/* อื่นๆ เพื่อความสมบูรณ์ของหน้า */
.toast-wrap { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 400; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; animation: fadeup 0.3s ease; white-space: nowrap; }
@keyframes fadeup { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">HewKao<span>Shop</span> 🌸</div>
  <div class="nav-links">
    <a href="#" class="active" data-en="Shop" data-th="ร้านค้า">Shop</a>
    <a href="#" data-en="Pre-order" data-th="พรีออเดอร์">Pre-order</a>
    <a href="#" data-en="Digital" data-th="ไฟล์ดิจิทัล">Digital</a>
  </div>
  <div class="nav-lang">
    <button class="active" onclick="setLang('en')">EN</button>
    <button onclick="setLang('th')">TH</button>
  </div>
  <div style="position:relative;">
    <button class="btn-login" id="loginBtn">
      🔑 <span id="loginBtnText">Login</span>
      <span class="cart-badge-nav" id="cartBadgeNav">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag" data-en="✨ New Arrivals!" data-th="✨ สินค้าใหม่!">✨ New Arrivals!</div>
  <h1><em data-en="Cute things," data-th="ของน่ารัก">Cute things,</em><br><span data-en="made with love 🌸" data-th="ทำด้วยใจ 🌸">made with love 🌸</span></h1>
  <p data-en="Original art, prints & digital goods." data-th="งานศิลปะ และสินค้าดิจิทัล">Original art, prints & digital goods.</p>
</div>

<div class="section">
  <div class="section-header">
    <h2 data-en="All Items" data-th="สินค้าทั้งหมด">All Items</h2>
    <span class="sub" id="item-count">0 items</span>
  </div>
  <div class="cats">
    <button class="cat-btn c1 active" onclick="filterProducts('all',this)">All ✿</button>
    <button class="cat-btn c2" onclick="filterProducts('physical',this)">Physical 📦</button>
    <button class="cat-btn c3" onclick="filterProducts('digital',this)">Digital 💾</button>
  </div>
  <div class="products" id="products-grid">
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  // --- CONFIG ---
  // ถ้าทำบนเครื่องตัวเองใช้ localhost:3000 ถ้าขึ้นเว็บแล้วใช้เครื่องหมาย / ได้เลย
  const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
  let lang = 'en';
  let allProducts = [];
  const bgMap = ['bg1','bg2','bg3','bg4'];

  // --- 1. โหลดข้อมูลสินค้า ---
  async function loadProducts() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;">🌸 Loading...</div>';
    
    try {
      const res = await fetch(`${API}/api/products`);
      allProducts = await res.json();
      renderProducts(allProducts);
    } catch(e) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:red;">⚠️ Error connecting to server.</div>';
    }
  }

  // --- 2. แสดงผลสินค้า (จุดสำคัญที่แก้เรื่องรูป) ---
  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    const count = document.getElementById('item-count');
    count.textContent = products.length + (lang === 'en' ? ' items' : ' รายการ');

    if (!products.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;">No products found 🌸</div>`;
      return;
    }

    grid.innerHTML = products.map((p, i) => {
      const bg = bgMap[i % 4];
      const badgeClass = p.type === 'digital' ? 'digital' : (p.type === 'preorder' ? 'preorder' : '');
      
      // --- จุดที่แก้: ตรวจสอบรูปภาพ ---
      const imgContent = p.image_url 
        ? `<img src="${p.image_url}" alt="${p.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='${p.emoji || '📦'}'">`
        : (p.emoji || '📦');

      return `
        <div class="card" onclick="showToast('🌸 Product detail coming soon!')">
          <div class="card-img ${p.image_url ? '' : bg}">
            ${imgContent}
            ${p.badge ? `<span class="card-badge ${badgeClass}">${p.badge}</span>` : ''}
            <button class="wishlist" onclick="event.stopPropagation(); this.textContent='❤️'">🤍</button>
          </div>
          <div class="card-body">
            <h3>${lang === 'en' ? p.name : (p.name_th || p.name)}</h3>
            <p class="card-sub">${p.description || (lang === 'en' ? 'In stock' : 'มีสินค้า')}</p>
            <div class="card-footer">
              <div class="price">฿${Number(p.price).toLocaleString()}</div>
              <button class="btn-cart" onclick="event.stopPropagation(); showToast('Added! 🛒')">
                ${lang === 'en' ? '+ Cart' : '+ ตะกร้า'}
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // --- 3. ฟังก์ชันเสริมอื่นๆ ---
  function filterProducts(type, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = type === 'all' ? allProducts : allProducts.filter(p => p.type === type);
    renderProducts(filtered);
  }

  function setLang(l) {
    lang = l;
    document.querySelectorAll('.nav-lang button').forEach((b,i) => b.classList.toggle('active', (i===0 && l==='en') || (i===1 && l==='th')));
    renderProducts(allProducts);
  }

  function showToast(msg) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  // เริ่มทำงาน
  loadProducts();
</script>
</body>
</html>
