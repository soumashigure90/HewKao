<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HewKao Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- CSS เดิมของคุณทั้งหมด (คงไว้เพื่อรักษาธีม) --- */
:root {
  --pink:    #FFB7C5; --pink-l:  #FFE4EC; --pink-d:  #e8829a;
  --lav:     #C9B8F0; --lav-l:   #EDE8FC; --mint:    #B2E8D8;
  --mint-l:  #E2F8F2; --yellow:  #FFE5A0; --yellow-l:#FFF8DC;
  --peach:   #FFCBA4; --cream:   #FFF9F5; --text:    #4a3f5c;
  --text-s:  #8a7a9a; --white:   #ffffff; --radius:  18px;
  --shadow:  0 4px 24px rgba(180,140,200,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
nav { background: var(--white); border-bottom: 2px solid var(--pink-l); padding: 0 2rem; display: flex; align-items: center; height: 64px; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(255,183,197,0.15); }
.nav-logo { font-family: 'Quicksand', sans-serif; font-size: 22px; font-weight: 700; color: var(--pink-d); flex: 1; }
.nav-logo span { color: var(--lav); }
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-links a { text-decoration: none; font-size: 14px; font-weight: 600; color: var(--text-s); padding: 6px 14px; border-radius: 20px; transition: 0.2s; }
.nav-links a:hover, .nav-links a.active { background: var(--pink-l); color: var(--pink-d); }
.nav-lang { display: flex; background: var(--cream); border-radius: 20px; overflow: hidden; border: 1.5px solid var(--pink-l); }
.nav-lang button { border: none; background: none; cursor: pointer; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--text-s); }
.nav-lang button.active { background: var(--pink); color: #fff; }
.btn-login { background: var(--lav); color: #fff; border: none; cursor: pointer; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; position: relative; }
.cart-badge-nav { position:absolute; top:-6px; right:-6px; background:var(--pink-d); color:#fff; width:18px; height:18px; border-radius:50%; font-size:10px; display:none; align-items:center; justify-content:center; }
.cart-badge-nav.show { display:flex; }

/* HERO & SECTIONS */
.hero { background: linear-gradient(135deg, var(--pink-l) 0%, var(--lav-l) 50%, var(--mint-l) 100%); padding: 4rem 2rem; text-align: center; }
.hero h1 { font-family: 'Quicksand', sans-serif; font-size: 42px; color: var(--text); margin-bottom: 1rem; }
.section { padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }
.cats { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
.cat-btn { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; background: var(--white); border: 2px solid var(--pink-l); }
.cat-btn.active { background: var(--pink); color: #fff; border-color: var(--pink); }

/* PRODUCT CARDS */
.products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: 0.2s; cursor: pointer; }
.card:hover { transform: translateY(-5px); }
.card-img { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 50px; position: relative; background: #f9f9f9; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-body { padding: 15px; }
.price { color: var(--pink-d); font-weight: 700; font-size: 18px; }
.btn-cart { background: var(--pink-l); color: var(--pink-d); border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; }

/* MODALS & OVERLAYS */
.overlay, .prod-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
.overlay.open, .prod-overlay.open { display: flex; }
.modal, .prod-modal { background: #fff; padding: 2rem; border-radius: 25px; width: 90%; max-width: 400px; position: relative; }
.toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; }
.toast { background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; margin-top: 5px; animation: fadeInUp 0.3s; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">HewKao<span>Shop</span> 🌸</div>
  <div class="nav-links">
    <a href="#" class="active">Shop</a>
    <a href="#">About</a>
  </div>
  <div class="nav-lang">
    <button class="active" onclick="setLang('en')">EN</button>
    <button onclick="setLang('th')">TH</button>
  </div>
  <div style="position:relative;">
    <button class="btn-login" id="loginBtn" onclick="handleLoginClick()">
      🔑 <span id="loginBtnText">Login</span>
      <span class="cart-badge-nav" id="cartBadgeNav">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <h1><em>Cute things,</em><br>made with love 🌸</h1>
  <p>Original art, prints & digital goods.</p>
</div>

<div class="section">
  <div class="section-header">
    <h2 id="title-text">All Items</h2>
    <span class="sub" id="item-count">0 items</span>
  </div>
  <div class="cats">
    <button class="cat-btn active" onclick="filterProducts('all', this)">All ✿</button>
    <button class="cat-btn" onclick="filterProducts('physical', this)">Physical 📦</button>
    <button class="cat-btn" onclick="filterProducts('digital', this)">Digital 💾</button>
  </div>
  <div class="products" id="products-grid">
    </div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="modal">
    <button style="position:absolute; right:15px; top:15px; border:none; background:none; cursor:pointer;" onclick="closeLogin()">✕</button>
    <h3>Login</h3>
    <p style="font-size:12px; color:#888; margin-bottom:15px;">เข้าสู่ระบบเพื่อจัดการร้านค้า</p>
    <input type="text" id="loginUser" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
    <input type="password" id="loginPass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;">
    <button class="btn-primary" onclick="doLogin()" style="width:100%; background:var(--pink-d); color:#fff; border:none; padding:10px; border-radius:10px; cursor:pointer;">Login</button>
    <p id="loginErr" style="color:red; font-size:12px; margin-top:10px; display:none;"></p>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  // --- CONFIG ---
  const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
  let allProducts = [];
  let lang = 'en';

  // --- 1. จัดการการคลิกที่ปุ่ม Login ---
  function handleLoginClick() {
    const token = localStorage.getItem('mochi_token');
    if (token) {
      // ถ้าล็อกอินแล้ว ให้ไปหน้า Admin
      window.location.href = 'admin.html';
    } else {
      // ถ้ายังไม่ล็อกอิน ให้เปิด Modal
      document.getElementById('loginOverlay').classList.add('open');
    }
  }

  function closeLogin() {
    document.getElementById('loginOverlay').classList.remove('open');
  }

  // --- 2. ฟังก์ชัน Login ---
  async function doLogin() {
    const username = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');

    try {
      const res = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('mochi_token', data.token);
      localStorage.setItem('mochi_user', data.username);
      localStorage.setItem('mochi_role', data.role);
      
      showToast('Login Success! 🌸');
      window.location.reload(); // รีโหลดเพื่ออัปเดตสถานะปุ่ม
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
  }

  // --- 3. โหลดและแสดงสินค้า ---
  async function loadProducts() {
    const grid = document.getElementById('products-grid');
    try {
      const res = await fetch(`${API}/api/products`);
      allProducts = await res.json(); // แก้จาก response.json เป็น res.json
      renderProducts(allProducts);
    } catch (e) {
      grid.innerHTML = '<p>Error loading products. Please try again.</p>';
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    const count = document.getElementById('item-count');
    count.textContent = `${products.length} ${lang === 'en' ? 'items' : 'รายการ'}`;

    grid.innerHTML = products.map((p, i) => {
      // เลือกแสดงรูปภาพ หรือ Emoji ถ้าไม่มีรูป
      const imgHtml = p.image_url 
        ? `<img src="${p.image_url}" alt="${p.name}">` 
        : `<span>${p.emoji || '📦'}</span>`;

      return `
        <div class="card" onclick="showToast('${p.name}')">
          <div class="card-img">
            ${imgHtml}
            ${p.badge ? `<div style="position:absolute; top:10px; left:10px; background:var(--pink-d); color:#fff; font-size:10px; padding:3px 8px; border-radius:10px;">${p.badge}</div>` : ''}
          </div>
          <div class="card-body">
            <h3 style="font-size:14px; margin-bottom:5px;">${p.name}</h3>
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="price">฿${Number(p.price).toLocaleString()}</span>
              <button class="btn-cart" onclick="event.stopPropagation(); showToast('Added to cart! 🛒')">+</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // --- 4. ฟังก์ชันเสริม (Filter, Lang, Toast) ---
  function filterProducts(type, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = type === 'all' ? allProducts : allProducts.filter(p => p.type === type);
    renderProducts(filtered);
  }

  function setLang(l) {
    lang = l;
    document.querySelectorAll('.nav-lang button').forEach((b, i) => {
        b.classList.toggle('active', (i===0 && l==='en') || (i===1 && l==='th'));
    });
    renderProducts(allProducts);
  }

  function showToast(msg) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  // ตรวจสอบสถานะล็อกอินตอนโหลดหน้า
  window.onload = () => {
    const user = localStorage.getItem('mochi_user');
    if (user) document.getElementById('loginBtnText').textContent = user;
    loadProducts();
  };
</script>
</body>
</html>
