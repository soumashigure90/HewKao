<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MochiShop - Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffb7c5;
            --secondary: #9b59b6;
            --bg: #fffaf0;
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 40px 20px; 
            color: #444;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--secondary); font-size: 2.5rem; margin-bottom: 10px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); }
        
        .card-img { 
            height: 250px; 
            background: #f0f0f0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 20px; flex-grow: 1; }
        .card-body h3 { margin: 0 0 10px 0; font-size: 1.25rem; color: #333; }
        .card-type { font-size: 0.9rem; color: #888; margin-bottom: 15px; }
        
        .card-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: auto;
        }
        .price { font-size: 1.3rem; font-weight: bold; color: var(--secondary); }
        .btn-add { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-family: 'Kanit', sans-serif;
            transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.8; }
        
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>MochiShop</h1>
            <p>Cute things, made with love 🌸</p>
        </div>
        
        <div class="grid" id="productList">
            <p style="text-align: center; grid-column: 1/-1;">กำลังเปิดประตูร้านค้า...</p>
        </div>
    </div>

    <script>
        async function fetchProducts() {
            try {
                // เรียก API จาก server.js ของเรา
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const list = document.getElementById('productList');
                list.innerHTML = '';

                if (products.length === 0) {
                    list.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">ตอนนี้ยังไม่มีสินค้าในร้านเลย</p>';
                    return;
                }

                products.forEach(item => {
                    // เลือกใช้รูปภาพจาก file_url หรือ image_url (ตามที่มีใน Database)
                    const imgUrl = item.file_url || item.image_url;
                    const imageHtml = imgUrl 
                        ? `<img src="${imgUrl}" alt="${item.name}">` 
                        : `<div style="font-size: 50px;">✨</div>`;

                    list.innerHTML += `
                        <div class="card">
                            <div class="card-img">
                                ${imageHtml}
                                ${item.type ? `<div class="badge">${item.type}</div>` : ''}
                            </div>
                            <div class="card-body">
                                <h3>${item.name}</h3>
                                <p class="card-type">${item.description || ''}</p>
                                <div class="card-footer">
                                    <span class="price">${item.price} <small>THB</small></span>
                                    <button class="btn-add">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('productList').innerHTML = '<p style="text-align: center; color: red; grid-column: 1/-1;">เกิดข้อผิดพลาดในการโหลดสินค้า</p>';
            }
        }

        // เริ่มโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        window.onload = fetchProducts;
    </script>
</body>
</html>
