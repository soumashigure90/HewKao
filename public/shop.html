/* --- ก๊อปปี้ CSS ของหน้าร้านคุณมาวางตรงนี้ --- */
:root {
  --pink:    #FFB7C5; --pink-l:  #FFE4EC; --pink-d:  #e8829a;
  --lav:     #C9B8F0; --lav-l:   #EDE8FC; --mint:    #B2E8D8;
  --mint-l:  #E2F8F2; --yellow:  #FFE5A0; --yellow-l:#FFF8DC;
  --peach:   #FFCBA4; --cream:   #FFF9F5; --text:    #4a3f5c;
  --text-s:  #8a7a9a; --white:   #ffffff; --radius:  18px;
  --shadow:  0 4px 24px rgba(180,140,200,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
/* ... (ใส่ CSS ร้านค้าที่เหลือของคุณที่นี่) ... */

/* --- [เพิ่มใหม่] CSS ของ Shigure Mascot --- */
#toggle-btn-shigure {
  position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px;
  background: rgba(0, 0, 0, 0.7); color: white; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 24px; z-index: 1000001; 
}
.shigure-container {
  position: fixed; width: 500px; height: 500px;
  top: calc(100vh - 380px); left: calc(100vw - 550px);
  cursor: grab; z-index: 1000000; user-select: none; touch-action: none;
  transform-origin: center bottom; transition: top 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
.shigure-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: contain; background-repeat: no-repeat; background-position: center bottom;
  pointer-events: none; transition: opacity 0.1s ease-out;
}
.layer-edge-full  { z-index: 500; background-image: url('test/shigure_edge.png'); opacity: 0; }
.layer-edge-blink { z-index: 510; background-image: url('test/shigure_edge2.png'); opacity: 0; }
.layer-fall-full  { z-index: 400; background-image: url('test/shigure_fall.png'); opacity: 0; }
.layer-drag-full  { z-index: 410; background-image: url('test/shigure_drag.png'); opacity: 0; }
.layer-drag-alt   { z-index: 420; background-image: url('test/shigure_drag2.png'); opacity: 0; }
/* ... (CSS อนิเมชั่นและ Z-index ผมจัดการ Path เป็น test/ ให้หมดแล้ว) ... */
.layer-hair-back    { z-index: 10; animation: hairBackSway 10s ease-in-out infinite; transform-origin: center top; }
.layer-main-body    { z-index: 30; }
.layer-head         { z-index: 100; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
.layer-eyes-l, .layer-eyes-r, .layer-mouth { z-index: 150; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }
.layer-hair-front   { z-index: 200; animation: headNaturalMove 15s ease-in-out infinite; transform-origin: 50% 35%; }

@keyframes headNaturalMove { 0%, 25%, 100% { transform: rotate(0deg) translateY(0); } 35%, 50% { transform: rotate(-1.5deg) translateY(1px); } 60%, 75% { transform: rotate(1.5deg) translateY(-1px); } 85%, 95% { transform: rotate(0deg) translateY(4px); } }
@keyframes hairBackSway { 0%, 100% { transform: skewX(-0.5deg); } 50% { transform: skewX(0.5deg); } }
@keyframes hairSideSwayL { 0%, 100% { transform: rotate(-1deg) skewY(0.5deg); } 50% { transform: rotate(1.2deg) skewY(-0.5deg); } }
@keyframes hairSideSwayR { 0%, 100% { transform: rotate(1deg) skewY(-0.5deg); } 50% { transform: rotate(-1.2deg) skewY(0.5deg); } }
</style>
